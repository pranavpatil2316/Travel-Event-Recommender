<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Loading Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-2xl font-bold mb-6">JavaScript Loading Test</h1>
        
        <div class="bg-white rounded-lg shadow-lg p-6 mb-8">
            <h2 class="text-xl font-semibold mb-6 text-gray-800">Script Loading Status</h2>
            <div id="scriptStatus" class="space-y-2">
                <div>Testing script loading...</div>
            </div>
        </div>
        
        <div class="bg-white rounded-lg shadow-lg p-6 mb-8">
            <h2 class="text-xl font-semibold mb-6 text-gray-800">Test Form</h2>
            <form id="testForm" class="space-y-4">
                <div>
                    <label for="country" class="block text-sm font-medium text-gray-700 mb-2">Country</label>
                    <select id="country" name="country" class="w-full px-3 py-2 border border-gray-300 rounded-md" required>
                        <option value="">Select a country...</option>
                        <option value="France">France</option>
                        <option value="Japan">Japan</option>
                        <option value="United Kingdom">United Kingdom</option>
                    </select>
                </div>
                
                <div>
                    <label for="season" class="block text-sm font-medium text-gray-700 mb-2">Season</label>
                    <select id="season" name="season" class="w-full px-3 py-2 border border-gray-300 rounded-md" required>
                        <option value="">Select a season...</option>
                        <option value="spring">Spring</option>
                        <option value="summer">Summer</option>
                        <option value="autumn">Autumn</option>
                        <option value="winter">Winter</option>
                    </select>
                </div>
                
                <div class="flex justify-center pt-4">
                    <button type="submit" class="bg-blue-600 text-white px-8 py-3 rounded-lg font-semibold hover:bg-blue-700">
                        Test Submit
                    </button>
                </div>
            </form>
        </div>
        
        <div id="results" class="bg-white rounded-lg shadow-lg p-6 hidden">
            <h3 class="text-lg font-semibold mb-4">Test Results</h3>
            <div id="testResults"></div>
        </div>
    </div>

    <script>
        // Test script loading
        const scriptStatus = document.getElementById('scriptStatus');
        const testResults = document.getElementById('testResults');
        
        function updateStatus(script, status, error = null) {
            const div = document.createElement('div');
            div.className = status ? 'text-green-600' : 'text-red-600';
            div.innerHTML = `<strong>${script}:</strong> ${status ? '✅ Loaded' : '❌ Failed'} ${error ? `(${error})` : ''}`;
            scriptStatus.appendChild(div);
        }
        
        // Test each script
        function testScript(src, name) {
            return new Promise((resolve) => {
                const script = document.createElement('script');
                script.src = src;
                script.onload = () => {
                    updateStatus(name, true);
                    resolve(true);
                };
                script.onerror = () => {
                    updateStatus(name, false, 'File not found or syntax error');
                    resolve(false);
                };
                document.head.appendChild(script);
            });
        }
        
        // Test all scripts
        async function testAllScripts() {
            const scripts = [
                { src: 'shared-database.js', name: 'Shared Database' },
                { src: 'recommendation-engine.js', name: 'Recommendation Engine' },
                { src: 'sample_reviews.js', name: 'Sample Reviews' },
                { src: 'script.js', name: 'Main Script' }
            ];
            
            let allLoaded = true;
            for (const script of scripts) {
                const loaded = await testScript(script.src, script.name);
                if (!loaded) allLoaded = false;
            }
            
            // Test form functionality
            const form = document.getElementById('testForm');
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const formData = new FormData(form);
                const country = formData.get('country');
                const season = formData.get('season');
                
                testResults.innerHTML = `
                    <p><strong>Form Data:</strong></p>
                    <p>Country: ${country}</p>
                    <p>Season: ${season}</p>
                    <p><strong>Script Status:</strong></p>
                    <p>All scripts loaded: ${allLoaded ? '✅ Yes' : '❌ No'}</p>
                    <p><strong>Available Functions:</strong></p>
                    <p>handleFormSubmission: ${typeof handleFormSubmission !== 'undefined' ? '✅ Available' : '❌ Not available'}</p>
                    <p>sharedEventDB: ${typeof sharedEventDB !== 'undefined' ? '✅ Available' : '❌ Not available'}</p>
                    <p>RecommendationEngine: ${typeof RecommendationEngine !== 'undefined' ? '✅ Available' : '❌ Not available'}</p>
                `;
                
                document.getElementById('results').classList.remove('hidden');
            });
        }
        
        // Start testing when page loads
        document.addEventListener('DOMContentLoaded', testAllScripts);
    </script>
</body>
</html>
