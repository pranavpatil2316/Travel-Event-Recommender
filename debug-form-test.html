<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Debug Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-2xl font-bold mb-6">Form Debug Test</h1>
        
        <div class="bg-white rounded-lg shadow-lg p-6 mb-8">
            <h2 class="text-xl font-semibold mb-6 text-gray-800">Test Form</h2>
            <form id="testForm" class="space-y-4">
                <div>
                    <label for="country" class="block text-sm font-medium text-gray-700 mb-2">Country</label>
                    <select id="country" name="country" class="w-full px-3 py-2 border border-gray-300 rounded-md" required>
                        <option value="">Select a country...</option>
                        <option value="France">France</option>
                        <option value="Japan">Japan</option>
                        <option value="United Kingdom">United Kingdom</option>
                    </select>
                </div>
                
                <div>
                    <label for="season" class="block text-sm font-medium text-gray-700 mb-2">Season</label>
                    <select id="season" name="season" class="w-full px-3 py-2 border border-gray-300 rounded-md" required>
                        <option value="">Select a season...</option>
                        <option value="spring">Spring</option>
                        <option value="summer">Summer</option>
                        <option value="autumn">Autumn</option>
                        <option value="winter">Winter</option>
                    </select>
                </div>
                
                <div class="flex justify-center pt-4">
                    <button type="submit" class="bg-blue-600 text-white px-8 py-3 rounded-lg font-semibold hover:bg-blue-700">
                        Test Submit
                    </button>
                </div>
            </form>
        </div>
        
        <div id="results" class="bg-white rounded-lg shadow-lg p-6 hidden">
            <h3 class="text-lg font-semibold mb-4">Form Submitted Successfully!</h3>
            <div id="formData"></div>
        </div>
    </div>

    <script>
        console.log('Debug script loaded');
        
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, initializing form...');
            
            const form = document.getElementById('testForm');
            if (!form) {
                console.error('Form not found!');
                return;
            }
            
            console.log('Form found:', form);
            
            form.addEventListener('submit', function(e) {
                console.log('Form submit event triggered');
                e.preventDefault();
                console.log('Default prevented');
                
                const formData = new FormData(form);
                const country = formData.get('country');
                const season = formData.get('season');
                
                console.log('Form data:', { country, season });
                
                if (!country || !season) {
                    alert('Please fill in all fields');
                    return false;
                }
                
                // Show results
                document.getElementById('results').classList.remove('hidden');
                document.getElementById('formData').innerHTML = `
                    <p><strong>Country:</strong> ${country}</p>
                    <p><strong>Season:</strong> ${season}</p>
                `;
                
                return false;
            });
            
            console.log('Form event listener attached');
        });
    </script>
</body>
</html>
