<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Test - Local Debug</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #map { 
            height: 500px; 
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            background-color: #f8fafc;
        }
    </style>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-center mb-8">🗺️ Map Test - Local Debug</h1>
        
        <div class="bg-white rounded-lg p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">Test Form</h2>
            <form id="testForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Country:</label>
                    <select id="country" name="country" class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2">
                        <option value="">Select Country</option>
                        <option value="France">France</option>
                        <option value="Japan">Japan</option>
                        <option value="United Kingdom">United Kingdom</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">City:</label>
                    <select id="city" name="city" class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2">
                        <option value="">All cities in country...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Season:</label>
                    <select id="season" name="season" class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2">
                        <option value="spring">Spring</option>
                        <option value="summer">Summer</option>
                        <option value="autumn">Autumn</option>
                        <option value="winter">Winter</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Duration:</label>
                    <select id="duration" name="duration" class="mt-1 block w-full border border-gray-300 rounded-md px-3 py-2">
                        <option value="1-3 days">1-3 days</option>
                        <option value="1 week">1 week</option>
                        <option value="2 weeks">2 weeks</option>
                        <option value="1 month">1 month</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-blue-500 text-white py-2 px-4 rounded-md hover:bg-blue-600">
                    Test Map Display
                </button>
            </form>
        </div>

        <div class="bg-white rounded-lg p-6">
            <h2 class="text-xl font-semibold mb-4">Map Section</h2>
            <div id="map"></div>
        </div>

        <div class="bg-white rounded-lg p-6 mt-6">
            <h2 class="text-xl font-semibold mb-4">Console Logs</h2>
            <div id="console-logs" class="bg-gray-900 text-green-400 p-4 rounded-md font-mono text-sm max-h-96 overflow-y-auto">
                <div>Console logs will appear here...</div>
            </div>
        </div>
    </div>

    <script>
        // Override console.log to show in the page
        const originalLog = console.log;
        const originalError = console.error;
        const logContainer = document.getElementById('console-logs');
        
        function addLog(message, type = 'log') {
            const div = document.createElement('div');
            div.className = type === 'error' ? 'text-red-400' : 'text-green-400';
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logContainer.appendChild(div);
            logContainer.scrollTop = logContainer.scrollHeight;
        }
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            addLog(args.join(' '), 'log');
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            addLog(args.join(' '), 'error');
        };

        // Test data
        const testEvents = [
            {
                id: 1,
                title: "Paris Cultural Festival",
                description: "Experience the rich culture and traditions of Paris during spring. This vibrant festival showcases local arts, music, and traditions.",
                category: "Art & Culture",
                city: "Paris",
                rating: 4.5,
                ratingCount: 15,
                indoor_outdoor: "outdoor",
                lat: 48.8566,
                lon: 2.3522,
                start_time: new Date().toISOString(),
                end_time: new Date(Date.now() + 86400000).toISOString(),
                reviews: [
                    { user_name: 'Sarah M.', rating: 5, review_text: 'Amazing cultural experience!', date: '2024-01-15' },
                    { user_name: 'James K.', rating: 4, review_text: 'Great festival, very authentic.', date: '2024-01-10' }
                ]
            },
            {
                id: 2,
                title: "Paris Food Tour",
                description: "Discover local cuisine and culinary traditions in Paris. Taste authentic dishes and learn about local food culture.",
                category: "Food & Drink",
                city: "Paris",
                rating: 4.7,
                ratingCount: 23,
                indoor_outdoor: "indoor",
                lat: 48.8566 + 0.005,
                lon: 2.3522 + 0.005,
                start_time: new Date().toISOString(),
                end_time: new Date(Date.now() + 7200000).toISOString(),
                reviews: [
                    { user_name: 'Maria G.', rating: 5, review_text: 'Delicious food and great guide!', date: '2024-01-12' },
                    { user_name: 'David W.', rating: 4, review_text: 'Excellent food tour experience.', date: '2024-01-08' }
                ]
            }
        ];

        // Initialize form
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, initializing test form...');
            
            const form = document.getElementById('testForm');
            const countrySelect = document.getElementById('country');
            const citySelect = document.getElementById('city');
            
            // Handle country selection
            countrySelect.addEventListener('change', function() {
                const selectedCountry = this.value;
                console.log('Country selected:', selectedCountry);
                
                if (selectedCountry) {
                    const cities = {
                        'France': ['Paris', 'Lyon', 'Marseille'],
                        'Japan': ['Tokyo', 'Osaka', 'Kyoto'],
                        'United Kingdom': ['London', 'Manchester', 'Birmingham']
                    };
                    
                    citySelect.innerHTML = '<option value="">All cities in country...</option>';
                    cities[selectedCountry].forEach(city => {
                        const option = document.createElement('option');
                        option.value = city;
                        option.textContent = city;
                        citySelect.appendChild(option);
                    });
                } else {
                    citySelect.innerHTML = '<option value="">All cities in country...</option>';
                }
            });
            
            // Handle form submission
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                console.log('Form submitted, testing map display...');
                
                const formData = new FormData(form);
                const country = formData.get('country');
                const city = formData.get('city');
                const season = formData.get('season');
                const duration = formData.get('duration');
                
                console.log('Form data:', { country, city, season, duration });
                
                // Test map display
                displayMap(testEvents, city || country);
            });
            
            console.log('Test form initialized successfully');
        });

        // Map display function (copied from main app)
        function displayMap(events, destination) {
            console.log('=== MAP DEBUG START ===');
            console.log('Displaying map with events:', events.length);
            console.log('Events data:', events);
            
            const mapElement = document.getElementById('map');
            if (!mapElement) {
                console.error('❌ Map element not found');
                return;
            }
            
            console.log('✅ Map element found, dimensions:', mapElement.offsetWidth, 'x', mapElement.offsetHeight);
            
            // Always create the visual map first - this will definitely work
            createVisualMap(events, mapElement);
            
            console.log('=== MAP DEBUG END ===');
        }

        function createVisualMap(events, mapElement) {
            console.log('Creating visual map with', events.length, 'events');
            
            // Ensure map element is visible and has proper dimensions
            mapElement.style.minHeight = '500px';
            mapElement.style.width = '100%';
            mapElement.style.display = 'block';
            mapElement.style.backgroundColor = '#f8fafc';
            mapElement.style.border = '2px solid #e2e8f0';
            mapElement.style.borderRadius = '12px';
            mapElement.style.padding = '20px';
            mapElement.style.boxShadow = '0 4px 6px -1px rgba(0, 0, 0, 0.1)';
            
            if (events && events.length > 0) {
                // Group events by city
                const eventsByCity = {};
                events.forEach(event => {
                    if (!eventsByCity[event.city]) {
                        eventsByCity[event.city] = [];
                    }
                    eventsByCity[event.city].push(event);
                });
                
                const cities = Object.keys(eventsByCity);
                console.log('Events grouped by cities:', cities);
                
                let mapHTML = `
                    <div class="w-full">
                        <div class="text-center mb-6">
                            <h3 class="text-2xl font-bold text-gray-800 mb-2">🗺️ Event Locations Map</h3>
                            <p class="text-gray-600">Showing ${events.length} events across ${cities.length} cities</p>
                        </div>
                        
                        <div class="mt-6 text-center">
                            <p class="text-gray-600 text-sm">Interactive map will appear below if Leaflet library loads successfully</p>
                        </div>
                        
                        <div class="mt-6 bg-gradient-to-r from-blue-50 to-purple-50 rounded-lg p-4">
                            <h4 class="font-semibold text-gray-800 mb-2">📊 Location Summary</h4>
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm">
                                <div class="text-center">
                                    <div class="text-2xl font-bold text-blue-600">${events.length}</div>
                                    <div class="text-gray-600">Total Events</div>
                                </div>
                                <div class="text-center">
                                    <div class="text-2xl font-bold text-green-600">${cities.length}</div>
                                    <div class="text-gray-600">Cities</div>
                                </div>
                                <div class="text-center">
                                    <div class="text-2xl font-bold text-purple-600">${(events.reduce((sum, event) => sum + event.rating, 0) / events.length).toFixed(1)}</div>
                                    <div class="text-gray-600">Avg Rating</div>
                                </div>
                                <div class="text-center">
                                    <div class="text-2xl font-bold text-orange-600">${[...new Set(events.map(e => e.category))].length}</div>
                                    <div class="text-gray-600">Categories</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                
                mapElement.innerHTML = mapHTML;
                console.log('✅ Visual map created successfully');
            } else {
                mapElement.innerHTML = `
                    <div class="text-center py-12">
                        <div class="text-6xl mb-4">🗺️</div>
                        <h3 class="text-xl font-semibold text-gray-800 mb-2">No Events to Display</h3>
                        <p class="text-gray-600">No events found for the selected criteria.</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
