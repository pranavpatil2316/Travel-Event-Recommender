<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Form Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-md mx-auto bg-white rounded-lg shadow-lg p-6">
        <h1 class="text-2xl font-bold mb-4">Simple Form Test</h1>
        
        <form id="testForm">
            <div class="mb-4">
                <label for="country" class="block text-sm font-medium text-gray-700 mb-2">Country</label>
                <select id="country" name="country" class="w-full px-3 py-2 border border-gray-300 rounded-md" required>
                    <option value="">Select a country...</option>
                    <option value="France">France</option>
                    <option value="Japan">Japan</option>
                    <option value="United Kingdom">United Kingdom</option>
                </select>
            </div>
            
            <div class="mb-4">
                <label for="city" class="block text-sm font-medium text-gray-700 mb-2">City</label>
                <select id="city" name="city" class="w-full px-3 py-2 border border-gray-300 rounded-md">
                    <option value="">All cities...</option>
                    <option value="Paris">Paris</option>
                    <option value="Tokyo">Tokyo</option>
                    <option value="London">London</option>
                </select>
            </div>
            
            <div class="mb-4">
                <label for="season" class="block text-sm font-medium text-gray-700 mb-2">Season</label>
                <select id="season" name="season" class="w-full px-3 py-2 border border-gray-300 rounded-md" required>
                    <option value="">Select season...</option>
                    <option value="spring">Spring</option>
                    <option value="summer">Summer</option>
                    <option value="autumn">Autumn</option>
                    <option value="winter">Winter</option>
                </select>
            </div>
            
            <div class="mb-6">
                <label for="duration" class="block text-sm font-medium text-gray-700 mb-2">Duration</label>
                <select id="duration" name="duration" class="w-full px-3 py-2 border border-gray-300 rounded-md" required>
                    <option value="">Select duration...</option>
                    <option value="short">Short (1-3 days)</option>
                    <option value="medium">Medium (4-7 days)</option>
                    <option value="long">Long (8+ days)</option>
                </select>
            </div>
            
            <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700">
                Test Submit
            </button>
        </form>
        
        <div id="result" class="mt-4 p-4 bg-gray-100 rounded-md hidden">
            <h3 class="font-semibold">Form Data:</h3>
            <div id="formData"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, setting up form...');
            
            const form = document.getElementById('testForm');
            const result = document.getElementById('result');
            const formData = document.getElementById('formData');
            
            if (!form) {
                console.error('Form not found!');
                return;
            }
            
            console.log('Form found:', form);
            
            form.addEventListener('submit', function(e) {
                console.log('Form submit event triggered');
                e.preventDefault();
                console.log('Default prevented');
                
                const data = new FormData(form);
                const country = data.get('country');
                const city = data.get('city');
                const season = data.get('season');
                const duration = data.get('duration');
                
                console.log('Form data:', { country, city, season, duration });
                
                formData.innerHTML = `
                    <p><strong>Country:</strong> ${country}</p>
                    <p><strong>City:</strong> ${city || 'All cities'}</p>
                    <p><strong>Season:</strong> ${season}</p>
                    <p><strong>Duration:</strong> ${duration}</p>
                `;
                
                result.classList.remove('hidden');
                
                return false;
            });
            
            console.log('Form event listener attached');
        });
    </script>
</body>
</html>
