<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel + Event Hybrid Recommender</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 400px; }
        .event-card {
            transition: transform 0.2s ease-in-out;
        }
        .event-card:hover {
            transform: translateY(-2px);
        }
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .popup-content {
            background: white;
            border-radius: 12px;
            padding: 24px;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            margin: 20px;
        }
        .star-rating {
            display: inline-flex;
            gap: 2px;
        }
        .star {
            cursor: pointer;
            font-size: 20px;
            color: #d1d5db;
            transition: color 0.2s;
        }
        .star.active {
            color: #fbbf24;
        }
        .star:hover {
            color: #f59e0b;
        }
        .review-card {
            border-left: 4px solid #3b82f6;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Header -->
    <header class="bg-gradient-to-r from-blue-600 to-purple-600 text-white py-8">
        <div class="container mx-auto px-4 text-center">
            <h1 class="text-4xl font-bold mb-2">Travel + Event Hybrid Recommender</h1>
            <p class="text-xl opacity-90">Discover amazing events around the world</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        <!-- Form Section -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-8">
            <h2 class="text-2xl font-semibold mb-6 text-gray-800">Plan Your Trip</h2>
            <form id="recommendationForm" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    <!-- Country -->
                    <div>
                        <label for="country" class="block text-sm font-medium text-gray-700 mb-2">Country</label>
                        <select id="country" name="country" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                            <option value="">Select a country...</option>
                            <option value="France">France</option>
                            <option value="Japan">Japan</option>
                            <option value="United Kingdom">United Kingdom</option>
                            <option value="Italy">Italy</option>
                            <option value="Spain">Spain</option>
                            <option value="Germany">Germany</option>
                            <option value="United States">United States</option>
                            <option value="Canada">Canada</option>
                            <option value="Australia">Australia</option>
                            <option value="India">India</option>
                            <option value="Thailand">Thailand</option>
                            <option value="Brazil">Brazil</option>
                            <option value="Mexico">Mexico</option>
                            <option value="South Korea">South Korea</option>
                            <option value="Singapore">Singapore</option>
                        </select>
                    </div>

                    <!-- City -->
                    <div>
                        <label for="city" class="block text-sm font-medium text-gray-700 mb-2">City (Optional)</label>
                        <select id="city" name="city" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" disabled>
                            <option value="">Select a country first...</option>
                        </select>
                        <div id="cityLoading" class="hidden text-sm text-gray-500 mt-1">Loading cities...</div>
                        <p class="text-xs text-gray-500 mt-1">Leave empty to see events from all cities in the country</p>
                    </div>

                    <!-- Season -->
                    <div>
                        <label for="season" class="block text-sm font-medium text-gray-700 mb-2">Travel Season</label>
                        <select id="season" name="season" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                            <option value="">Select season...</option>
                            <option value="spring">Spring</option>
                            <option value="summer">Summer</option>
                            <option value="autumn">Autumn</option>
                            <option value="winter">Winter</option>
                        </select>
                    </div>

                    <!-- Duration -->
                    <div>
                        <label for="duration" class="block text-sm font-medium text-gray-700 mb-2">Trip Duration</label>
                        <select id="duration" name="duration" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                            <option value="">Select duration...</option>
                            <option value="short">Short (1-3 days)</option>
                            <option value="medium">Medium (4-7 days)</option>
                            <option value="long">Long (8+ days)</option>
                            <option value="extended">Extended (10+ days)</option>
                        </select>
                    </div>
                </div>

                <div class="flex justify-center pt-4">
                    <button type="submit" class="bg-gradient-to-r from-blue-600 to-purple-600 text-white px-8 py-3 rounded-lg font-semibold hover:from-blue-700 hover:to-purple-700 transition-all duration-200 transform hover:scale-105">
                        Show All Events
                    </button>
                </div>
            </form>
        </div>

        <!-- Results Section -->
        <div id="resultsSection" class="hidden">
            <!-- Loading State -->
            <div id="loadingState" class="text-center py-8">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
                <p class="mt-2 text-gray-600">Loading all events for your destination...</p>
            </div>

            <!-- Results Content -->
            <div id="resultsContent" class="hidden">
                <!-- Summary -->
                <div id="summary" class="mb-6"></div>

                <!-- Events List -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
                    <div id="eventsList"></div>
                </div>

                <!-- Map -->
                <div class="bg-white rounded-lg shadow-lg p-6 mb-8">
                    <h3 class="text-xl font-semibold mb-4">Event Locations</h3>
                    <div id="map"></div>
                </div>

                <!-- No Events Message -->
                <div id="noEventsMessage" class="hidden text-center py-8">
                    <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-6">
                        <div class="text-yellow-600 text-4xl mb-4">📅</div>
                        <h3 class="text-lg font-semibold text-yellow-800 mb-2">No Events Found</h3>
                        <p class="text-yellow-700">No events found for this destination.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script>
        // Global variables
        let eventsData = [];
        let map;
        let markers = [];

        // Sample events data with ratings and reviews
        const sampleEvents = [
            {
                id: 1,
                title: "Louvre Museum Tour",
                city: "Paris",
                country: "France",
                category: "Art & Culture",
                description: "Explore the world's largest art museum and historic monument in Paris.",

                reviews: [

                    { user_name: "James K.", rating: 4, review_text: "Great museum but very crowded. Book tickets in advance!", date: "2024-02-10" },
                    { user_name: "Emma L.", rating: 5, review_text: "A must-visit in Paris. The Mona Lisa is breathtaking.", date: "2024-02-08" }
                ]
            },
            {
                id: 2,
                title: "Tokyo Cherry Blossom Festival",
                city: "Tokyo",

                start_time: "2024-04-01T09:00:00Z",

                location: "Ueno Park, Tokyo",
                coordinates: [35.7162, 139.7731],
                rating: 4.9,
                ratingCount: 22,
                reviews: [
                    { user_name: "Michael R.", rating: 5, review_text: "Magical experience! The cherry blossoms are stunning.", date: "2024-03-20" },
                    { user_name: "Anna T.", rating: 5, review_text: "Perfect timing for cherry blossom season. Highly recommended!", date: "2024-03-18" },
                    { user_name: "David W.", rating: 4, review_text: "Beautiful but very crowded. Go early in the morning.", date: "2024-03-15" }
                ]
            },
            {
                id: 3,
                title: "London Tower Bridge Tour",
                city: "London",
                country: "United Kingdom",
                category: "History & Heritage",
                description: "Discover the history of London's iconic Tower Bridge.",
                start_time: "2024-05-10T10:00:00Z",
                end_time: "2024-05-10T17:00:00Z",
                location: "Tower Bridge, London",
                coordinates: [51.5055, -0.0754],
                rating: 4.6,
                ratingCount: 18,
                reviews: [
                    { user_name: "Lisa P.", rating: 4, review_text: "Interesting history and great views from the top.", date: "2024-04-25" },
                    { user_name: "Robert H.", rating: 5, review_text: "Fascinating tour with knowledgeable guides.", date: "2024-04-22" },
                    { user_name: "Maria G.", rating: 4, review_text: "Good value for money. The glass floor is thrilling!", date: "2024-04-20" }
                ]
            },
            {
                id: 4,
                title: "Rome Colosseum Night Tour",
                city: "Rome",
                country: "Italy",
                category: "History & Heritage",
                description: "Explore the Colosseum under the stars with a guided night tour.",
                start_time: "2024-06-15T20:00:00Z",
                end_time: "2024-06-15T23:00:00Z",
                location: "Colosseum, Rome",
                coordinates: [41.8902, 12.4922],
                rating: 4.7,
                ratingCount: 12,
                reviews: [
                    { user_name: "John D.", rating: 5, review_text: "Incredible experience! The night lighting is magical.", date: "2024-05-30" },
                    { user_name: "Sophie L.", rating: 4, review_text: "Great tour but a bit expensive. Worth it for the experience.", date: "2024-05-28" },
                    { user_name: "Alex M.", rating: 5, review_text: "Amazing way to see the Colosseum without the crowds.", date: "2024-05-25" }
                ]
            },
            {
                id: 5,
                title: "Barcelona Food Tour",
                city: "Barcelona",
                country: "Spain",
                category: "Food & Drink",
                description: "Taste authentic Spanish cuisine on a guided food tour through Barcelona.",
                start_time: "2024-07-20T11:00:00Z",
                end_time: "2024-07-20T15:00:00Z",
                location: "La Boqueria Market, Barcelona",
                coordinates: [41.3820, 2.1715],
                rating: 4.8,
                ratingCount: 20,
                reviews: [
                    { user_name: "Carlos R.", rating: 5, review_text: "Delicious food and great guide! Learned so much about Spanish cuisine.", date: "2024-06-15" },
                    { user_name: "Isabella M.", rating: 4, review_text: "Fun experience with lots of food samples. Come hungry!", date: "2024-06-12" },
                    { user_name: "Pedro S.", rating: 5, review_text: "Best food tour in Barcelona. Highly recommended!", date: "2024-06-10" }
                ]
            }
        ];

        // Initialize the application
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, initializing application...');
            initializeForm();
            loadEventsData();
        });

        // Initialize form functionality
        function initializeForm() {
            console.log('Initializing form...');
            
            const form = document.getElementById('recommendationForm');
            const countrySelect = document.getElementById('country');
            const citySelect = document.getElementById('city');
            const cityLoading = document.getElementById('cityLoading');
            
            if (!form) {
                console.error('Form element not found!');
                return;
            }
            
            console.log('Form element found:', form);

            // Handle country selection
            countrySelect.addEventListener('change', function() {
                const selectedCountry = this.value;
                
                if (selectedCountry) {
                    cityLoading.classList.remove('hidden');
                    citySelect.disabled = true;
                    citySelect.innerHTML = '<option value="">Loading cities...</option>';
                    
                    // Simulate loading cities
                    setTimeout(() => {
                        const cities = getCitiesForCountry(selectedCountry);
                        populateCityDropdown(cities);
                    }, 500);
                } else {
                    citySelect.disabled = true;
                    citySelect.innerHTML = '<option value="">Select a country first...</option>';
                    cityLoading.classList.add('hidden');
                }
            });

            // Handle form submission
            form.addEventListener('submit', function(e) {
                console.log('Form submit event triggered');
                e.preventDefault();
                console.log('Default prevented, calling handleFormSubmission');
                handleFormSubmission();
                return false;
            });

            // Set default season based on current month
            const currentMonth = new Date().getMonth() + 1;
            let defaultSeason = 'spring';
            if (currentMonth >= 3 && currentMonth <= 5) defaultSeason = 'spring';
            else if (currentMonth >= 6 && currentMonth <= 8) defaultSeason = 'summer';
            else if (currentMonth >= 9 && currentMonth <= 11) defaultSeason = 'autumn';
            else defaultSeason = 'winter';
            
            document.getElementById('season').value = defaultSeason;

            console.log('Form initialized successfully');
        }

        // Get cities for country
        function getCitiesForCountry(country) {
            const cityMap = {
                'France': ['Paris', 'Lyon', 'Marseille', 'Nice', 'Toulouse'],
                'Japan': ['Tokyo', 'Osaka', 'Kyoto', 'Hiroshima', 'Nagoya'],
                'United Kingdom': ['London', 'Manchester', 'Birmingham', 'Liverpool', 'Edinburgh'],
                'Italy': ['Rome', 'Milan', 'Naples', 'Florence', 'Venice'],
                'Spain': ['Madrid', 'Barcelona', 'Seville', 'Valencia', 'Bilbao'],
                'Germany': ['Berlin', 'Munich', 'Hamburg', 'Cologne', 'Frankfurt'],
                'United States': ['New York', 'Los Angeles', 'Chicago', 'Houston', 'Phoenix'],
                'Canada': ['Toronto', 'Vancouver', 'Montreal', 'Calgary', 'Ottawa'],
                'Australia': ['Sydney', 'Melbourne', 'Brisbane', 'Perth', 'Adelaide'],
                'India': ['Mumbai', 'Delhi', 'Bangalore', 'Chennai', 'Kolkata'],
                'Thailand': ['Bangkok', 'Chiang Mai', 'Phuket', 'Pattaya', 'Krabi'],
                'Brazil': ['São Paulo', 'Rio de Janeiro', 'Brasília', 'Salvador', 'Fortaleza'],
                'Mexico': ['Mexico City', 'Guadalajara', 'Monterrey', 'Puebla', 'Tijuana'],
                'South Korea': ['Seoul', 'Busan', 'Incheon', 'Daegu', 'Daejeon'],
                'Singapore': ['Singapore']
            };
            
            return cityMap[country] || [];
        }

        // Populate city dropdown
        function populateCityDropdown(cities) {
            const citySelect = document.getElementById('city');
            const cityLoading = document.getElementById('cityLoading');
            
            // Populate city dropdown
            citySelect.innerHTML = '<option value="">All cities in country...</option>';
            
            cities.forEach(city => {
                const option = document.createElement('option');
                option.value = city;
                option.textContent = city;
                citySelect.appendChild(option);
            });
            
            // Enable city selection and hide loading
            citySelect.disabled = false;
            cityLoading.classList.add('hidden');
        }

        // Load events data
        function loadEventsData() {
            eventsData = sampleEvents;
            console.log('Events data loaded:', eventsData.length, 'events');
        }

        // Handle form submission
        function handleFormSubmission() {
            console.log('handleFormSubmission called');
            
            const formData = new FormData(document.getElementById('recommendationForm'));
            const country = formData.get('country');
            const city = formData.get('city');
            const season = formData.get('season');
            const duration = formData.get('duration');

            console.log('Form values:', { country, city, season, duration });

            if (!country || !season || !duration) {
                alert('Please fill in country, season, and duration fields');
                return;
            }

            console.log('Form validation passed, showing results section');
            
            // Show results section and loading state
            showResultsSection();
            showLoadingState();

            // Simulate processing delay for better UX
            setTimeout(() => {
                try {
                    console.log('Starting to fetch events...');
                    const allEvents = getAllEventsForCountryOrCity(country, city, season, duration);
                    console.log('Events fetched, displaying results...');
                    displayResults(allEvents, city || 'All Cities', country, season);
                } catch (error) {
                    console.error('Error in form submission:', error);
                    alert('Error loading events. Please try again.');
                }
            }, 1000);
        }

        // Get all events for a country or specific city
        function getAllEventsForCountryOrCity(country, city, season, duration) {
            let allEvents = [];

            if (city && city.trim() !== '') {
                // Get events for specific city
                allEvents = eventsData.filter(event => 
                    event.city.toLowerCase() === city.toLowerCase()
                );
            } else {
                // Get events for all cities in the country
                allEvents = eventsData.filter(event => 
                    event.country.toLowerCase() === country.toLowerCase()
                );
            }

            if (allEvents.length === 0) {
                // Create a fallback event
                allEvents = [{
                    id: Date.now(),
                    title: `${city || country} Cultural Festival`,
                    city: city || 'Various Cities',
                    country: country,
                    category: 'Art & Culture',
                    description: `Experience the rich culture and traditions of ${city || country} during this seasonal festival.`,
                    start_time: new Date().toISOString(),
                    end_time: new Date(Date.now() + 86400000).toISOString(),
                    location: `${city || country} City Center`,
                    coordinates: [0, 0],
                    rating: 4.5,
                    ratingCount: 8,
                    reviews: [
                        { user_name: "Local Guide", rating: 4, review_text: "Great cultural experience!", date: "2024-01-15" },
                        { user_name: "Tourist", rating: 5, review_text: "Amazing festival with local traditions.", date: "2024-01-10" }
                    ]
                }];
            }

            // Sort by rating (highest first)
            return allEvents.sort((a, b) => b.rating - a.rating);
        }

        // Show results section
        function showResultsSection() {
            const resultsSection = document.getElementById('resultsSection');
            if (resultsSection) {
                resultsSection.classList.remove('hidden');
                resultsSection.scrollIntoView({ behavior: 'smooth' });
            }
        }

        // Show loading state
        function showLoadingState() {
            const loadingState = document.getElementById('loadingState');
            const resultsContent = document.getElementById('resultsContent');
            
            if (loadingState) {
                loadingState.classList.remove('hidden');
            }
            if (resultsContent) {
                resultsContent.classList.add('hidden');
            }
        }

        // Display results
        function displayResults(events, city, country, season) {
            console.log('Displaying results for:', { events: events?.length, city, country, season });
            
            const loadingState = document.getElementById('loadingState');
            const resultsContent = document.getElementById('resultsContent');
            
            if (loadingState) {
                loadingState.classList.add('hidden');
            }
            if (resultsContent) {
                resultsContent.classList.remove('hidden');
            }
            
            if (!events || events.length === 0) {
                document.getElementById('noEventsMessage').classList.remove('hidden');
                return;
            }
            
            // Display summary
            displaySummary(events, city, country, season);
            
            // Display events list
            displayEventsList(events);
            
            // Display map
            displayMap(events, city || country);
        }

        // Display summary
        function displaySummary(events, city, country, season) {
            const summaryElement = document.getElementById('summary');
            if (!summaryElement) return;
            
            const avgRating = events.reduce((sum, event) => sum + event.rating, 0) / events.length;
            const totalReviews = events.reduce((sum, event) => sum + event.ratingCount, 0);
            
            summaryElement.innerHTML = `
                <div class="bg-gradient-to-r from-blue-50 to-purple-50 rounded-lg p-6 mb-6">
                    <h3 class="text-xl font-semibold mb-4 text-gray-800">Trip Summary</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="text-center">
                            <div class="text-2xl font-bold text-blue-600">${events.length}</div>
                            <div class="text-sm text-gray-600">Total Events</div>
                        </div>
                        <div class="text-center">
                            <div class="text-2xl font-bold text-yellow-500">${avgRating.toFixed(1)} ⭐</div>
                            <div class="text-sm text-gray-600">Avg Rating</div>
                        </div>
                        <div class="text-center">
                            <div class="text-2xl font-bold text-green-600">${totalReviews}</div>
                            <div class="text-sm text-gray-600">Total Reviews</div>
                        </div>
                    </div>
                    <div class="mt-4 text-center">
                        <p class="text-gray-700">
                            <strong>${city}</strong> in <strong>${country}</strong> during <strong>${season}</strong>
                        </p>
                    </div>
                </div>
            `;
        }

        // Display events list
        function displayEventsList(events) {
            const eventsListElement = document.getElementById('eventsList');
            if (!eventsListElement) return;
            
            eventsListElement.innerHTML = events.map(event => `
                <div class="event-card bg-white rounded-lg shadow-md p-6 hover:shadow-lg transition-shadow">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h4 class="text-lg font-semibold text-gray-800">${event.title}</h4>
                            <p class="text-sm text-gray-600">${event.city}</p>
                        </div>
                        <div class="text-right">
                            <div class="text-lg font-bold text-yellow-500">${event.rating.toFixed(1)} ⭐</div>
                            <div class="text-xs text-gray-500">${event.ratingCount} reviews</div>
                        </div>
                    </div>
                    <p class="text-gray-700 mb-4">${event.description}</p>
                    <div class="flex justify-between items-center mb-4">
                        <span class="inline-block bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded-full">
                            ${event.category}
                        </span>
                        <div class="text-sm text-gray-500">
                            ${new Date(event.start_time).toLocaleDateString()}
                        </div>
                    </div>
                    <div class="mt-3 flex space-x-2">
                        <button onclick="showEventDetails(${event.id})" class="bg-blue-500 text-white text-xs px-3 py-1 rounded hover:bg-blue-600">
                            View Details
                        </button>
                        <button onclick="showEventReviews(${event.id})" class="bg-green-500 text-white text-xs px-3 py-1 rounded hover:bg-green-600">
                            Reviews (${event.reviews ? event.reviews.length : 0})
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Display map
        function displayMap(events, destination) {
            const mapElement = document.getElementById('map');
            if (!mapElement) return;
            
            // Clear existing map
            if (map) {
                map.remove();
            }
            
            // Initialize map
            map = L.map('map').setView([0, 0], 2);
            
            // Add OpenStreetMap tiles
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);
            
            // Add markers for events
            let bounds = [];
            events.forEach(event => {
                if (event.coordinates && event.coordinates[0] !== 0 && event.coordinates[1] !== 0) {
                    const marker = L.marker(event.coordinates).addTo(map);
                    marker.bindPopup(`
                        <div class="p-2">
                            <h4 class="font-semibold">${event.title}</h4>
                            <p class="text-sm text-gray-600">${event.city}</p>
                            <p class="text-sm">${event.rating.toFixed(1)} ⭐ (${event.ratingCount} reviews)</p>
                        </div>
                    `);
                    bounds.push(event.coordinates);
                }
            });
            
            // Fit map to show all markers
            if (bounds.length > 0) {
                map.fitBounds(bounds);
            }
        }

        // Show event details
        function showEventDetails(eventId) {
            const event = eventsData.find(e => e.id === eventId);
            if (!event) return;
            
            const popupOverlay = document.createElement('div');
            popupOverlay.className = 'popup-overlay';
            popupOverlay.onclick = () => popupOverlay.remove();
            
            const popupContent = document.createElement('div');
            popupContent.className = 'popup-content';
            popupContent.onclick = (e) => e.stopPropagation();
            
            popupContent.innerHTML = `
                <h3 class="text-xl font-semibold mb-4">${event.title}</h3>
                <div class="space-y-3">
                    <p><strong>Location:</strong> ${event.location}</p>
                    <p><strong>Category:</strong> ${event.category}</p>
                    <p><strong>Date:</strong> ${new Date(event.start_time).toLocaleDateString()}</p>
                    <p><strong>Time:</strong> ${new Date(event.start_time).toLocaleTimeString()} - ${new Date(event.end_time).toLocaleTimeString()}</p>
                    <p><strong>Rating:</strong> ${event.rating.toFixed(1)} ⭐ (${event.ratingCount} reviews)</p>
                    <p><strong>Description:</strong> ${event.description}</p>
                </div>
                <div class="mt-6 flex space-x-3">
                    <button onclick="showEventReviews(${event.id})" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">
                        View Reviews
                    </button>
                    <button onclick="this.closest('.popup-overlay').remove()" class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">
                        Close
                    </button>
                </div>
            `;
            
            popupOverlay.appendChild(popupContent);
            document.body.appendChild(popupOverlay);
        }

        // Show event reviews
        function showEventReviews(eventId) {
            const event = eventsData.find(e => e.id === eventId);
            if (!event) return;
            
            const popupOverlay = document.createElement('div');
            popupOverlay.className = 'popup-overlay';
            popupOverlay.onclick = () => popupOverlay.remove();
            
            const popupContent = document.createElement('div');
            popupContent.className = 'popup-content';
            popupContent.onclick = (e) => e.stopPropagation();
            
            popupContent.innerHTML = `
                <h3 class="text-xl font-semibold mb-4">Reviews for ${event.title}</h3>
                <div class="text-center mb-4">
                    <div class="text-3xl font-bold text-yellow-500">${event.rating.toFixed(1)} ⭐</div>
                    <div class="text-sm text-gray-500">Based on ${event.ratingCount} reviews</div>
                </div>
                
                <div class="space-y-3 max-h-96 overflow-y-auto">
                    ${event.reviews.map(review => `
                        <div class="review-card bg-gray-50 p-3 rounded-lg">
                            <div class="flex justify-between items-start mb-2">
                                <div class="font-semibold text-sm">${review.user_name}</div>
                                <div class="text-yellow-500 text-sm">${'★'.repeat(review.rating)}${'☆'.repeat(5-review.rating)}</div>
                            </div>
                            <p class="text-sm text-gray-600 mb-1">${review.review_text}</p>
                            <div class="text-xs text-gray-400">${review.date}</div>
                        </div>
                    `).join('')}
                </div>
                
                <div class="mt-6">
                    <button onclick="this.closest('.popup-overlay').remove()" class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">
                        Close
                    </button>
                </div>
            `;
            
            popupOverlay.appendChild(popupContent);
            document.body.appendChild(popupOverlay);
        }

        console.log('Script loaded successfully');
    </script>
</body>
</html>
