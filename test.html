<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Test</title>
</head>
<body>
    <h1>Database Test</h1>
    <button onclick="testDatabase()">Test Database</button>
    <div id="results"></div>

    <script src="database.js"></script>
    <script src="sample_reviews.js"></script>
    <script>
        async function testDatabase() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p>Testing database...</p>';
            
            try {
                // Initialize database
                await initDatabase();
                console.log('Database initialized');
                
                // Get current user
                const user = await getCurrentUser();
                console.log('Current user:', user);
                
                // Add a test event
                const testEvent = {
                    title: 'Test Event',
                    city: 'Test City',
                    category: 'Sightseeing',
                    description: 'A test event for debugging',
                    start_time: new Date().toISOString(),
                    end_time: new Date(Date.now() + 3600000).toISOString(),
                    location: 'Test Location',
                    coordinates: [0, 0]
                };
                
                const eventId = await eventDB.addEvent(testEvent);
                console.log('Added test event with ID:', eventId);
                
                // Add some test reviews
                const testReviews = generateRandomReviews('Test Event', 'Sightseeing', 'Test City', 3);
                console.log('Generated test reviews:', testReviews);
                
                for (let i = 0; i < testReviews.length; i++) {
                    const review = testReviews[i];
                    await eventDB.addRating(eventId, user.id, review.rating);
                    await eventDB.addReview(eventId, user.id, review.rating, review.review_text, review.user_name);
                }
                
                // Get event with stats
                const eventWithStats = await eventDB.getEventWithStats(eventId);
                console.log('Event with stats:', eventWithStats);
                
                resultsDiv.innerHTML = `
                    <h2>Test Results:</h2>
                    <p>Event ID: ${eventId}</p>
                    <p>Average Rating: ${eventWithStats.averageRating}</p>
                    <p>Rating Count: ${eventWithStats.ratingCount}</p>
                    <p>Reviews Count: ${eventWithStats.reviews.length}</p>
                    <h3>Reviews:</h3>
                    ${eventWithStats.reviews.map(review => `
                        <div style="border: 1px solid #ccc; margin: 10px; padding: 10px;">
                            <strong>${review.user_name}</strong> - ${review.rating} ⭐<br>
                            ${review.review_text}
                        </div>
                    `).join('')}
                `;
                
            } catch (error) {
                console.error('Test failed:', error);
                resultsDiv.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
