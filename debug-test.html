<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Test - Travel Recommender</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-center mb-8">Debug Test - Travel Recommender</h1>
        
        <div class="bg-white p-6 rounded-lg shadow-lg mb-6">
            <h2 class="text-xl font-semibold mb-4">Script Loading Test</h2>
            <div id="scriptStatus" class="space-y-2">
                <div id="sharedDbStatus">❌ shared-database.js: Not loaded</div>
                <div id="recommendationStatus">❌ recommendation-engine.js: Not loaded</div>
                <div id="mainScriptStatus">❌ script.js: Not loaded</div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-lg mb-6">
            <h2 class="text-xl font-semibold mb-4">Form Test</h2>
            <form id="testForm">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Country</label>
                    <select id="country" class="w-full p-2 border border-gray-300 rounded-md">
                        <option value="">Select a country...</option>
                        <option value="Japan">Japan</option>
                        <option value="France">France</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-2">City</label>
                    <select id="city" class="w-full p-2 border border-gray-300 rounded-md">
                        <option value="">Select a city...</option>
                        <option value="Tokyo">Tokyo</option>
                        <option value="Paris">Paris</option>
                    </select>
                </div>
                <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700">
                    Test Form Submission
                </button>
            </form>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-lg">
            <h2 class="text-xl font-semibold mb-4">Console Logs</h2>
            <div id="consoleLogs" class="bg-gray-900 text-green-400 p-4 rounded-md font-mono text-sm h-64 overflow-y-auto">
                <!-- Console logs will appear here -->
            </div>
        </div>
    </div>

    <!-- Load scripts -->
    <script src="shared-database.js"></script>
    <script src="recommendation-engine.js"></script>
    <script src="script.js"></script>

    <script>
        // Override console.log to display in page
        const originalLog = console.log;
        const originalError = console.error;
        const logsDiv = document.getElementById('consoleLogs');
        
        function addLog(message, type = 'log') {
            const logEntry = document.createElement('div');
            logEntry.className = type === 'error' ? 'text-red-400' : 'text-green-400';
            logEntry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logsDiv.appendChild(logEntry);
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            addLog(args.join(' '), 'log');
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            addLog(args.join(' '), 'error');
        };

        // Check script loading
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, checking scripts...');
            
            // Check if scripts are loaded
            const sharedDbStatus = document.getElementById('sharedDbStatus');
            const recommendationStatus = document.getElementById('recommendationStatus');
            const mainScriptStatus = document.getElementById('mainScriptStatus');
            
            if (typeof sharedEventDB !== 'undefined') {
                sharedDbStatus.textContent = '✅ shared-database.js: Loaded';
                sharedDbStatus.className = 'text-green-600';
            }
            
            if (typeof RecommendationEngine !== 'undefined') {
                recommendationStatus.textContent = '✅ recommendation-engine.js: Loaded';
                recommendationStatus.className = 'text-green-600';
            }
            
            if (typeof initializeForm !== 'undefined') {
                mainScriptStatus.textContent = '✅ script.js: Loaded';
                mainScriptStatus.className = 'text-green-600';
            }

            // Test form submission
            const form = document.getElementById('testForm');
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                console.log('Form submitted - preventDefault() worked!');
                console.log('Country:', document.getElementById('country').value);
                console.log('City:', document.getElementById('city').value);
                
                // Test if functions are available
                if (typeof handleFormSubmission === 'function') {
                    console.log('handleFormSubmission function is available');
                    try {
                        handleFormSubmission();
                    } catch (error) {
                        console.error('Error calling handleFormSubmission:', error);
                    }
                } else {
                    console.error('handleFormSubmission function is NOT available');
                }
            });
        });
    </script>
</body>
</html>
