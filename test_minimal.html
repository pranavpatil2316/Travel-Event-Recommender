<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel + Event Hybrid Recommender - Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #map { height: 400px; }
        .event-card {
            transition: transform 0.2s ease-in-out;
        }
        .event-card:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Header -->
    <header class="bg-gradient-to-r from-blue-600 to-purple-600 text-white py-8">
        <div class="container mx-auto px-4 text-center">
            <h1 class="text-4xl font-bold mb-2">Travel + Event Hybrid Recommender</h1>
            <p class="text-xl opacity-90">Discover amazing events around the world</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        <!-- Form Section -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-8">
            <h2 class="text-2xl font-semibold mb-6 text-gray-800">Plan Your Trip</h2>
            <form id="recommendationForm" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    <!-- Country -->
                    <div>
                        <label for="country" class="block text-sm font-medium text-gray-700 mb-2">Country</label>
                        <select id="country" name="country" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                            <option value="">Select a country...</option>
                            <option value="France">France</option>
                            <option value="Japan">Japan</option>
                            <option value="United Kingdom">United Kingdom</option>
                            <option value="Italy">Italy</option>
                            <option value="Spain">Spain</option>
                            <option value="Germany">Germany</option>
                            <option value="United States">United States</option>
                            <option value="Canada">Canada</option>
                            <option value="Australia">Australia</option>
                            <option value="India">India</option>
                            <option value="Thailand">Thailand</option>
                            <option value="Brazil">Brazil</option>
                            <option value="Mexico">Mexico</option>
                            <option value="South Korea">South Korea</option>
                            <option value="Singapore">Singapore</option>
                        </select>
                    </div>

                    <!-- City -->
                    <div>
                        <label for="city" class="block text-sm font-medium text-gray-700 mb-2">City (Optional)</label>
                        <select id="city" name="city" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" disabled>
                            <option value="">Select a country first...</option>
                        </select>
                        <div id="cityLoading" class="hidden text-sm text-gray-500 mt-1">Loading cities...</div>
                        <p class="text-xs text-gray-500 mt-1">Leave empty to see events from all cities in the country</p>
                    </div>

                    <!-- Season -->
                    <div>
                        <label for="season" class="block text-sm font-medium text-gray-700 mb-2">Travel Season</label>
                        <select id="season" name="season" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                            <option value="">Select season...</option>
                            <option value="spring">Spring</option>
                            <option value="summer">Summer</option>
                            <option value="autumn">Autumn</option>
                            <option value="winter">Winter</option>
                        </select>
                    </div>

                    <!-- Duration -->
                    <div>
                        <label for="duration" class="block text-sm font-medium text-gray-700 mb-2">Trip Duration</label>
                        <select id="duration" name="duration" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                            <option value="">Select duration...</option>
                            <option value="short">Short (1-3 days)</option>
                            <option value="medium">Medium (4-7 days)</option>
                            <option value="long">Long (8+ days)</option>
                            <option value="extended">Extended (10+ days)</option>
                        </select>
                    </div>
                </div>

                <div class="flex justify-center pt-4">
                    <button type="submit" class="bg-gradient-to-r from-blue-600 to-purple-600 text-white px-8 py-3 rounded-lg font-semibold hover:from-blue-700 hover:to-purple-700 transition-all duration-200 transform hover:scale-105">
                        Show All Events
                    </button>
                </div>
            </form>
        </div>

        <!-- Results Section -->
        <div id="resultsSection" class="hidden">
            <!-- Loading State -->
            <div id="loadingState" class="text-center py-8">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
                <p class="mt-2 text-gray-600">Loading all events for your destination...</p>
            </div>

            <!-- Results Content -->
            <div id="resultsContent" class="hidden">
                <!-- Summary -->
                <div id="summary"></div>

                <!-- Events List -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
                    <div id="eventsList"></div>
                </div>

                <!-- No Events Message -->
                <div id="noEventsMessage" class="hidden text-center py-8">
                    <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-6">
                        <div class="text-yellow-600 text-4xl mb-4">📅</div>
                        <h3 class="text-lg font-semibold text-yellow-800 mb-2">No Events Found</h3>
                        <p class="text-yellow-700">No sample data for this city yet.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="script_minimal.js"></script>
</body>
</html>
