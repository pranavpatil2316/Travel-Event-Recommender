<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Event Recommender - Local Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .star-rating {
            display: inline-flex;
            gap: 2px;
        }
        .star {
            cursor: pointer;
            font-size: 20px;
            color: #d1d5db;
            transition: color 0.2s;
        }
        .star.active {
            color: #fbbf24;
        }
        .star:hover {
            color: #f59e0b;
        }
        .recommendation-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-gradient-to-r from-blue-600 to-purple-600 text-white py-8">
        <div class="container mx-auto px-4 text-center">
            <h1 class="text-4xl font-bold mb-2">Travel Event Recommender - Local Test</h1>
            <p class="text-lg opacity-90">Test the recommendation system locally</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        <!-- User Selection -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-8">
            <h2 class="text-2xl font-semibold mb-6 text-gray-800">Select Test User</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <button onclick="switchUser('user1')" id="user1Btn" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                    User 1 (Art Lover)
                </button>
                <button onclick="switchUser('user2')" id="user2Btn" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">
                    User 2 (Foodie)
                </button>
                <button onclick="switchUser('user3')" id="user3Btn" class="bg-purple-500 text-white px-4 py-2 rounded hover:bg-purple-600">
                    User 3 (Adventure Seeker)
                </button>
            </div>
            <div id="currentUser" class="mt-4 text-lg font-semibold text-gray-700">
                Current User: <span id="userName">User 1</span>
            </div>
        </div>

        <!-- Form Section -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-8">
            <h2 class="text-2xl font-semibold mb-6 text-gray-800">Get Recommendations</h2>
            <form id="recommendationForm" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label for="country" class="block text-sm font-medium text-gray-700 mb-2">Country</label>
                        <select id="country" name="country" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                            <option value="">Select a country...</option>
                            <option value="France">France</option>
                            <option value="Japan">Japan</option>
                            <option value="United Kingdom">United Kingdom</option>
                            <option value="Italy">Italy</option>
                            <option value="Spain">Spain</option>
                        </select>
                    </div>
                    <div>
                        <label for="city" class="block text-sm font-medium text-gray-700 mb-2">City (Optional)</label>
                        <select id="city" name="city" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">All cities...</option>
                            <option value="Paris">Paris</option>
                            <option value="Tokyo">Tokyo</option>
                            <option value="London">London</option>
                            <option value="Rome">Rome</option>
                            <option value="Barcelona">Barcelona</option>
                        </select>
                    </div>
                </div>
                <div class="flex justify-center pt-4">
                    <button type="submit" class="bg-gradient-to-r from-blue-600 to-purple-600 text-white px-8 py-3 rounded-lg font-semibold hover:from-blue-700 hover:to-purple-700 transition-all duration-200 transform hover:scale-105">
                        Get Personalized Recommendations
                    </button>
                </div>
            </form>
        </div>

        <!-- Results Section -->
        <div id="resultsSection" class="hidden">
            <!-- Loading State -->
            <div id="loadingState" class="text-center py-8">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
                <p class="mt-2 text-gray-600">Generating personalized recommendations...</p>
            </div>

            <!-- Results Content -->
            <div id="resultsContent" class="hidden">
                <!-- Summary -->
                <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
                    <h2 class="text-2xl font-semibold mb-4 text-gray-800">Your Personalized Recommendations</h2>
                    <div id="summaryStats" class="grid grid-cols-1 md:grid-cols-3 gap-4 text-center">
                        <!-- Stats will be populated by JavaScript -->
                    </div>
                </div>

                <!-- Recommendations List -->
                <div class="bg-white rounded-lg shadow-lg p-6">
                    <h3 class="text-xl font-semibold mb-4 text-gray-800">Recommended Events</h3>
                    <div id="recommendationsList" class="space-y-4">
                        <!-- Recommendations will be populated by JavaScript -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Local Test Recommendation Engine
        class LocalRecommendationEngine {
            constructor() {
                this.users = {
                    user1: {
                        name: 'Art Lover',
                        preferences: {
                            categories: {
                                'Art & Culture': { avg: 4.8 },
                                'History & Heritage': { avg: 4.2 },
                                'Food & Drink': { avg: 3.0 },
                                'Adventure & Sports': { avg: 2.5 }
                            },
                            indoorOutdoor: { indoor: 4.5, outdoor: 3.0 },
                            averageRating: 4.2,
                            totalRatings: 15
                        },
                        ratings: [
                            { eventId: 1, rating: 5, event: { title: 'Louvre Museum', category: 'Art & Culture', city: 'Paris' } },
                            { eventId: 2, rating: 5, event: { title: 'Uffizi Gallery', category: 'Art & Culture', city: 'Florence' } },
                            { eventId: 3, rating: 4, event: { title: 'Notre-Dame', category: 'History & Heritage', city: 'Paris' } }
                        ]
                    },
                    user2: {
                        name: 'Foodie',
                        preferences: {
                            categories: {
                                'Food & Drink': { avg: 4.9 },
                                'Art & Culture': { avg: 3.2 },
                                'History & Heritage': { avg: 3.0 },
                                'Adventure & Sports': { avg: 2.8 }
                            },
                            indoorOutdoor: { indoor: 4.0, outdoor: 3.5 },
                            averageRating: 3.8,
                            totalRatings: 12
                        },
                        ratings: [
                            { eventId: 4, rating: 5, event: { title: 'French Cooking Class', category: 'Food & Drink', city: 'Paris' } },
                            { eventId: 6, rating: 4, event: { title: 'Wine Tasting', category: 'Food & Drink', city: 'Bordeaux' } },
                            { eventId: 14, rating: 5, event: { title: 'Sushi Making Class', category: 'Food & Drink', city: 'Tokyo' } }
                        ]
                    },
                    user3: {
                        name: 'Adventure Seeker',
                        preferences: {
                            categories: {
                                'Adventure & Sports': { avg: 4.7 },
                                'Nature & Parks': { avg: 4.5 },
                                'Art & Culture': { avg: 2.8 },
                                'Food & Drink': { avg: 3.2 }
                            },
                            indoorOutdoor: { indoor: 2.5, outdoor: 4.8 },
                            averageRating: 3.9,
                            totalRatings: 18
                        },
                        ratings: [
                            { eventId: 7, rating: 5, event: { title: 'Mountain Hiking', category: 'Adventure & Sports', city: 'Chamonix' } },
                            { eventId: 8, rating: 5, event: { title: 'Rock Climbing', category: 'Adventure & Sports', city: 'Yosemite' } },
                            { eventId: 9, rating: 4, event: { title: 'Beach Volleyball', category: 'Adventure & Sports', city: 'Barcelona' } },
                            { eventId: 15, rating: 5, event: { title: 'Mount Fuji Hiking', category: 'Adventure & Sports', city: 'Tokyo' } }
                        ]
                    }
                };

                this.events = [
                    { id: 1, title: 'Louvre Museum', category: 'Art & Culture', city: 'Paris', description: 'World\'s largest art museum', indoor_outdoor: 'indoor' },
                    { id: 2, title: 'Uffizi Gallery', category: 'Art & Culture', city: 'Florence', description: 'Renaissance art collection', indoor_outdoor: 'indoor' },
                    { id: 3, title: 'Notre-Dame', category: 'History & Heritage', city: 'Paris', description: 'Gothic cathedral', indoor_outdoor: 'outdoor' },
                    { id: 4, title: 'French Cooking Class', category: 'Food & Drink', city: 'Paris', description: 'Learn French cuisine', indoor_outdoor: 'indoor' },
                    { id: 5, title: 'Tokyo Food Tour', category: 'Food & Drink', city: 'Tokyo', description: 'Explore Japanese cuisine', indoor_outdoor: 'outdoor' },
                    { id: 6, title: 'Wine Tasting', category: 'Food & Drink', city: 'Bordeaux', description: 'French wine experience', indoor_outdoor: 'indoor' },
                    { id: 7, title: 'Mountain Hiking', category: 'Adventure & Sports', city: 'Chamonix', description: 'Alpine hiking trails', indoor_outdoor: 'outdoor' },
                    { id: 8, title: 'Rock Climbing', category: 'Adventure & Sports', city: 'Yosemite', description: 'Granite climbing', indoor_outdoor: 'outdoor' },
                    { id: 9, title: 'Beach Volleyball', category: 'Adventure & Sports', city: 'Barcelona', description: 'Beach sports', indoor_outdoor: 'outdoor' },
                    { id: 10, title: 'Eiffel Tower', category: 'Sightseeing', city: 'Paris', description: 'Iconic tower', indoor_outdoor: 'outdoor' },
                    { id: 11, title: 'Sagrada Familia', category: 'Art & Culture', city: 'Barcelona', description: 'Gaudí\'s masterpiece', indoor_outdoor: 'indoor' },
                    { id: 12, title: 'Tower of London', category: 'History & Heritage', city: 'London', description: 'Historic castle', indoor_outdoor: 'outdoor' },
                    { id: 13, title: 'Tokyo National Museum', category: 'Art & Culture', city: 'Tokyo', description: 'Japanese art and history', indoor_outdoor: 'indoor' },
                    { id: 14, title: 'Sushi Making Class', category: 'Food & Drink', city: 'Tokyo', description: 'Learn authentic sushi making', indoor_outdoor: 'indoor' },
                    { id: 15, title: 'Mount Fuji Hiking', category: 'Adventure & Sports', city: 'Tokyo', description: 'Hike Japan\'s iconic mountain', indoor_outdoor: 'outdoor' },
                    { id: 16, title: 'Tokyo Skytree', category: 'Sightseeing', city: 'Tokyo', description: 'Tallest tower in Japan', indoor_outdoor: 'indoor' },
                    { id: 17, title: 'Senso-ji Temple', category: 'History & Heritage', city: 'Tokyo', description: 'Ancient Buddhist temple', indoor_outdoor: 'outdoor' },
                    { id: 18, title: 'Ramen Tasting Tour', category: 'Food & Drink', city: 'Tokyo', description: 'Explore Tokyo\'s best ramen', indoor_outdoor: 'outdoor' }
                ];

                this.currentUser = 'user1';
            }

            switchUser(userId) {
                this.currentUser = userId;
                return this.users[userId];
            }

            generateRecommendations(country, city) {
                const user = this.users[this.currentUser];
                const userPrefs = user.preferences;
                
                // Filter events by location
                let filteredEvents = this.events.filter(event => {
                    if (country && !this.getCountryFromCity(event.city).includes(country)) return false;
                    if (city && event.city !== city) return false;
                    return true;
                });

                // Get user's rated event IDs
                const ratedEventIds = new Set(user.ratings.map(r => r.eventId));
                
                // Filter out already rated events
                filteredEvents = filteredEvents.filter(event => !ratedEventIds.has(event.id));

                // Calculate recommendation scores
                const recommendations = filteredEvents.map(event => {
                    let score = 0;
                    let reasons = [];

                    // Category preference score (MOST IMPORTANT - 60% weight)
                    const categoryPref = userPrefs.categories[event.category];
                    if (categoryPref && categoryPref.avg > 3.0) {
                        score += categoryPref.avg * 0.6;
                        reasons.push(`You rate ${event.category} events highly (${categoryPref.avg.toFixed(1)}/5)`);
                    }

                    // Indoor/Outdoor preference (20% weight)
                    const indoorOutdoorPref = userPrefs.indoorOutdoor[event.indoor_outdoor];
                    if (indoorOutdoorPref > 3.0) {
                        score += indoorOutdoorPref * 0.2;
                        reasons.push(`You prefer ${event.indoor_outdoor} activities`);
                    }

                    // Overall rating pattern (20% weight)
                    if (userPrefs.averageRating > 3.0) {
                        score += userPrefs.averageRating * 0.2;
                    }

                    return {
                        event: event,
                        score: score,
                        reason: reasons.join(', '),
                        confidence: Math.min(score / 5, 1) * 100
                    };
                });

                // Sort by score and return top recommendations
                return recommendations
                    .filter(rec => {
                        // Only show recommendations if user has some preference for the category
                        const categoryPref = userPrefs.categories[rec.event.category];
                        return rec.score > 0 && categoryPref && categoryPref.avg > 3.0;
                    })
                    .sort((a, b) => b.score - a.score)
                    .slice(0, 6);
            }

            getCountryFromCity(city) {
                const cityCountryMap = {
                    'Paris': 'France',
                    'Florence': 'Italy',
                    'Bordeaux': 'France',
                    'Tokyo': 'Japan',
                    'Chamonix': 'France',
                    'Yosemite': 'United States',
                    'Barcelona': 'Spain',
                    'London': 'United Kingdom'
                };
                return cityCountryMap[city] || 'Unknown';
            }

            addRating(eventId, rating) {
                const user = this.users[this.currentUser];
                const event = this.events.find(e => e.id === eventId);
                
                if (event) {
                    // Add rating
                    user.ratings.push({ eventId: eventId, rating: rating, event: event });
                    
                    // Update preferences
                    this.updateUserPreferences(user, event, rating);
                    
                    return true;
                }
                return false;
            }

            updateUserPreferences(user, event, rating) {
                const prefs = user.preferences;
                
                // Update category preferences
                if (!prefs.categories[event.category]) {
                    prefs.categories[event.category] = { total: 0, count: 0, avg: 0 };
                }
                prefs.categories[event.category].total += rating;
                prefs.categories[event.category].count += 1;
                prefs.categories[event.category].avg = 
                    prefs.categories[event.category].total / prefs.categories[event.category].count;

                // Update indoor/outdoor preferences
                prefs.indoorOutdoor[event.indoor_outdoor] = 
                    (prefs.indoorOutdoor[event.indoor_outdoor] + rating) / 2;

                // Update overall average
                prefs.totalRatings += 1;
                prefs.averageRating = 
                    (prefs.averageRating * (prefs.totalRatings - 1) + rating) / prefs.totalRatings;
            }
        }

        // Initialize the recommendation engine
        const recommendationEngine = new LocalRecommendationEngine();

        // Switch user function
        function switchUser(userId) {
            const user = recommendationEngine.switchUser(userId);
            document.getElementById('userName').textContent = user.name;
            
            // Update button styles
            document.querySelectorAll('[id$="Btn"]').forEach(btn => {
                btn.classList.remove('ring-2', 'ring-blue-500');
            });
            document.getElementById(userId + 'Btn').classList.add('ring-2', 'ring-blue-500');
        }

        // Handle form submission
        document.getElementById('recommendationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const country = formData.get('country');
            const city = formData.get('city');

            if (!country) {
                alert('Please select a country');
                return;
            }

            // Show loading
            document.getElementById('resultsSection').classList.remove('hidden');
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('resultsContent').classList.add('hidden');

            // Simulate processing delay
            setTimeout(() => {
                const recommendations = recommendationEngine.generateRecommendations(country, city);
                displayRecommendations(recommendations, city || 'All Cities', country);
            }, 1500);
        });

        // Display recommendations
        function displayRecommendations(recommendations, city, country) {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('resultsContent').classList.remove('hidden');

            // Update summary
            const summaryContainer = document.getElementById('summaryStats');
            summaryContainer.innerHTML = `
                <div class="bg-blue-50 p-4 rounded-lg">
                    <div class="text-2xl font-bold text-blue-600">${recommendations.length}</div>
                    <div class="text-sm text-gray-600">Recommendations</div>
                </div>
                <div class="bg-green-50 p-4 rounded-lg">
                    <div class="text-2xl font-bold text-green-600">${recommendationEngine.users[recommendationEngine.currentUser].preferences.averageRating.toFixed(1)} ⭐</div>
                    <div class="text-sm text-gray-600">Your Avg Rating</div>
                </div>
                <div class="bg-purple-50 p-4 rounded-lg">
                    <div class="text-2xl font-bold text-purple-600">${recommendationEngine.users[recommendationEngine.currentUser].preferences.totalRatings}</div>
                    <div class="text-sm text-gray-600">Events Rated</div>
                </div>
            `;

            // Display recommendations
            const recommendationsContainer = document.getElementById('recommendationsList');
            if (recommendations.length === 0) {
                recommendationsContainer.innerHTML = `
                    <div class="text-center py-8 text-gray-500">
                        <p>No recommendations found. Try rating some events first!</p>
                    </div>
                `;
                return;
            }

            recommendationsContainer.innerHTML = recommendations.map(rec => `
                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                    <div class="flex justify-between items-start mb-2">
                        <h4 class="font-semibold text-gray-800">${rec.event.title}</h4>
                        <div class="flex items-center space-x-2">
                            <span class="recommendation-badge text-white text-xs px-2 py-1 rounded-full">
                                ${rec.confidence.toFixed(0)}% Match
                            </span>
                            <button onclick="rateEvent(${rec.event.id})" class="bg-blue-500 text-white text-xs px-3 py-1 rounded hover:bg-blue-600">
                                Rate Event
                            </button>
                        </div>
                    </div>
                    <p class="text-sm text-gray-600 mb-2">${rec.event.description}</p>
                    <div class="flex items-center justify-between text-xs text-gray-500 mb-2">
                        <div class="flex items-center space-x-2">
                            <span class="bg-blue-100 text-blue-800 px-2 py-1 rounded">${rec.event.category}</span>
                            <span class="bg-gray-100 text-gray-800 px-2 py-1 rounded">${rec.event.city}</span>
                            <span class="flex items-center">
                                ${rec.event.indoor_outdoor === 'indoor' ? '🏠' : '🌳'}
                                ${rec.event.indoor_outdoor}
                            </span>
                        </div>
                    </div>
                    <div class="text-sm text-gray-700 bg-yellow-50 p-2 rounded">
                        <strong>Why recommended:</strong> ${rec.reason}
                    </div>
                </div>
            `).join('');
        }

        // Rate event function
        function rateEvent(eventId) {
            const rating = prompt('Rate this event (1-5 stars):');
            if (rating && rating >= 1 && rating <= 5) {
                const success = recommendationEngine.addRating(parseInt(eventId), parseInt(rating));
                if (success) {
                    alert(`Thank you for rating! Your preferences have been updated.`);
                    // Refresh recommendations
                    const formData = new FormData(document.getElementById('recommendationForm'));
                    const country = formData.get('country');
                    const city = formData.get('city');
                    const recommendations = recommendationEngine.generateRecommendations(country, city);
                    displayRecommendations(recommendations, city || 'All Cities', country);
                }
            }
        }

        // Initialize with User 1
        switchUser('user1');
    </script>
</body>
</html>
