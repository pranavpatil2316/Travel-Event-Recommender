<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprehensive Form Debug</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-2xl font-bold mb-6">Comprehensive Form Debug</h1>
        
        <div class="bg-white rounded-lg shadow-lg p-6 mb-8">
            <h2 class="text-xl font-semibold mb-6 text-gray-800">Debug Information</h2>
            <div id="debugInfo" class="space-y-2 text-sm">
                <div>Loading debug information...</div>
            </div>
        </div>
        
        <div class="bg-white rounded-lg shadow-lg p-6 mb-8">
            <h2 class="text-xl font-semibold mb-6 text-gray-800">Test Form</h2>
            <form id="testForm" class="space-y-4">
                <div>
                    <label for="country" class="block text-sm font-medium text-gray-700 mb-2">Country</label>
                    <select id="country" name="country" class="w-full px-3 py-2 border border-gray-300 rounded-md" required>
                        <option value="">Select a country...</option>
                        <option value="France">France</option>
                        <option value="Japan">Japan</option>
                        <option value="United Kingdom">United Kingdom</option>
                    </select>
                </div>
                
                <div>
                    <label for="season" class="block text-sm font-medium text-gray-700 mb-2">Season</label>
                    <select id="season" name="season" class="w-full px-3 py-2 border border-gray-300 rounded-md" required>
                        <option value="">Select a season...</option>
                        <option value="spring">Spring</option>
                        <option value="summer">Summer</option>
                        <option value="autumn">Autumn</option>
                        <option value="winter">Winter</option>
                    </select>
                </div>
                
                <div class="flex justify-center pt-4">
                    <button type="submit" class="bg-blue-600 text-white px-8 py-3 rounded-lg font-semibold hover:bg-blue-700">
                        Test Submit
                    </button>
                </div>
            </form>
        </div>
        
        <div id="results" class="bg-white rounded-lg shadow-lg p-6 hidden">
            <h3 class="text-lg font-semibold mb-4">Form Submitted Successfully!</h3>
            <div id="formData"></div>
        </div>
        
        <div id="consoleOutput" class="bg-gray-900 text-green-400 p-4 rounded-lg mt-6">
            <h3 class="text-white font-semibold mb-2">Console Output:</h3>
            <div id="consoleLog" class="text-sm font-mono"></div>
        </div>
    </div>

    <script>
        // Capture console output
        const originalLog = console.log;
        const originalError = console.error;
        const consoleOutput = document.getElementById('consoleLog');
        
        function addToConsole(message, type = 'log') {
            const div = document.createElement('div');
            div.className = type === 'error' ? 'text-red-400' : 'text-green-400';
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            consoleOutput.appendChild(div);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            addToConsole(args.join(' '), 'log');
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            addToConsole(args.join(' '), 'error');
        };
        
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, starting comprehensive debug...');
            
            // Debug information
            const debugInfo = document.getElementById('debugInfo');
            debugInfo.innerHTML = `
                <div><strong>User Agent:</strong> ${navigator.userAgent}</div>
                <div><strong>Page URL:</strong> ${window.location.href}</div>
                <div><strong>Protocol:</strong> ${window.location.protocol}</div>
                <div><strong>Host:</strong> ${window.location.host}</div>
                <div><strong>JavaScript Enabled:</strong> ${typeof window !== 'undefined' ? 'Yes' : 'No'}</div>
                <div><strong>Form Element Found:</strong> ${document.getElementById('testForm') ? 'Yes' : 'No'}</div>
                <div><strong>Event Listener Support:</strong> ${typeof addEventListener !== 'undefined' ? 'Yes' : 'No'}</div>
            `;
            
            const form = document.getElementById('testForm');
            if (!form) {
                console.error('Form element not found!');
                return;
            }
            
            console.log('Form element found:', form);
            
            // Test multiple event attachment methods
            let handlerAttached = false;
            
            // Method 1: addEventListener
            try {
                form.addEventListener('submit', function(e) {
                    console.log('addEventListener: Form submit event triggered');
                    e.preventDefault();
                    console.log('addEventListener: Default prevented');
                    handleFormSubmission();
                });
                handlerAttached = true;
                console.log('addEventListener: Event handler attached successfully');
            } catch (error) {
                console.error('addEventListener: Failed to attach event handler:', error);
            }
            
            // Method 2: onsubmit property
            try {
                form.onsubmit = function(e) {
                    console.log('onsubmit: Form submit event triggered');
                    e.preventDefault();
                    console.log('onsubmit: Default prevented');
                    handleFormSubmission();
                    return false;
                };
                console.log('onsubmit: Event handler attached successfully');
            } catch (error) {
                console.error('onsubmit: Failed to attach event handler:', error);
            }
            
            // Method 3: onclick on button
            const submitButton = form.querySelector('button[type="submit"]');
            if (submitButton) {
                try {
                    submitButton.onclick = function(e) {
                        console.log('onclick: Button clicked');
                        e.preventDefault();
                        console.log('onclick: Default prevented');
                        handleFormSubmission();
                        return false;
                    };
                    console.log('onclick: Event handler attached successfully');
                } catch (error) {
                    console.error('onclick: Failed to attach event handler:', error);
                }
            }
            
            function handleFormSubmission() {
                console.log('handleFormSubmission called');
                
                const formData = new FormData(form);
                const country = formData.get('country');
                const season = formData.get('season');
                
                console.log('Form data:', { country, season });
                
                if (!country || !season) {
                    alert('Please fill in all fields');
                    return false;
                }
                
                // Show results
                document.getElementById('results').classList.remove('hidden');
                document.getElementById('formData').innerHTML = `
                    <p><strong>Country:</strong> ${country}</p>
                    <p><strong>Season:</strong> ${season}</p>
                    <p><strong>Timestamp:</strong> ${new Date().toLocaleString()}</p>
                `;
                
                console.log('Form submission handled successfully');
                return false;
            }
            
            console.log('Comprehensive debug setup completed');
        });
        
        // Test if page refreshes
        window.addEventListener('beforeunload', function(e) {
            console.log('Page is about to refresh/reload!');
            addToConsole('WARNING: Page refresh detected!', 'error');
        });
        
        window.addEventListener('load', function() {
            console.log('Page fully loaded');
        });
    </script>
</body>
</html>
