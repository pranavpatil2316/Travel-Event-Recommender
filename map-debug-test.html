<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Debug Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-2xl font-bold mb-6">Map Debug Test</h1>
        
        <div class="bg-white rounded-lg shadow-lg p-6 mb-8">
            <h2 class="text-xl font-semibold mb-6 text-gray-800">Debug Information</h2>
            <div id="debugInfo" class="space-y-2 text-sm">
                <div>Loading debug information...</div>
            </div>
        </div>
        
        <div class="bg-white rounded-lg shadow-lg p-6 mb-8">
            <h2 class="text-xl font-semibold mb-6 text-gray-800">Test Map</h2>
            <div id="map" style="height: 400px; width: 100%; border: 2px solid #ccc;"></div>
        </div>
        
        <div class="bg-white rounded-lg shadow-lg p-6 mb-8">
            <h2 class="text-xl font-semibold mb-6 text-gray-800">Test Events</h2>
            <button onclick="testMapWithEvents()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                Test Map with Sample Events
            </button>
        </div>
        
        <div id="consoleOutput" class="bg-gray-900 text-green-400 p-4 rounded-lg mt-6">
            <h3 class="text-white font-semibold mb-2">Console Output:</h3>
            <div id="consoleLog" class="text-sm font-mono"></div>
        </div>
    </div>

    <script>
        // Capture console output
        const originalLog = console.log;
        const originalError = console.error;
        const consoleOutput = document.getElementById('consoleLog');
        
        function addToConsole(message, type = 'log') {
            const div = document.createElement('div');
            div.className = type === 'error' ? 'text-red-400' : 'text-green-400';
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            consoleOutput.appendChild(div);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            addToConsole(args.join(' '), 'log');
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            addToConsole(args.join(' '), 'error');
        };
        
        let testMap = null;
        
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, starting map debug...');
            
            // Debug information
            const debugInfo = document.getElementById('debugInfo');
            debugInfo.innerHTML = `
                <div><strong>Leaflet Library:</strong> ${typeof L !== 'undefined' ? '✅ Loaded' : '❌ Not loaded'}</div>
                <div><strong>Map Element:</strong> ${document.getElementById('map') ? '✅ Found' : '❌ Not found'}</div>
                <div><strong>Map Dimensions:</strong> ${document.getElementById('map').offsetWidth}x${document.getElementById('map').offsetHeight}</div>
                <div><strong>User Agent:</strong> ${navigator.userAgent}</div>
            `;
            
            // Test basic map creation
            if (typeof L !== 'undefined') {
                console.log('Leaflet library is available');
                try {
                    testMap = L.map('map').setView([51.505, -0.09], 13);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '© OpenStreetMap contributors'
                    }).addTo(testMap);
                    
                    // Add a test marker
                    L.marker([51.5, -0.09]).addTo(testMap)
                        .bindPopup('Test marker - Map is working!')
                        .openPopup();
                    
                    console.log('Basic map created successfully');
                } catch (error) {
                    console.error('Error creating basic map:', error);
                }
            } else {
                console.error('Leaflet library not available');
            }
        });
        
        function testMapWithEvents() {
            console.log('Testing map with sample events...');
            
            if (!testMap) {
                console.error('Test map not initialized');
                return;
            }
            
            // Sample events with coordinates
            const sampleEvents = [
                {
                    id: 1,
                    title: 'Paris Cultural Festival',
                    city: 'Paris',
                    lat: 48.8566,
                    lon: 2.3522,
                    rating: 4.5
                },
                {
                    id: 2,
                    title: 'Tokyo Food Tour',
                    city: 'Tokyo',
                    lat: 35.6762,
                    lon: 139.6503,
                    rating: 4.7
                },
                {
                    id: 3,
                    title: 'London Historical Sites',
                    city: 'London',
                    lat: 51.5074,
                    lon: -0.1278,
                    rating: 4.3
                }
            ];
            
            console.log('Sample events:', sampleEvents.length);
            
            // Clear existing markers
            testMap.eachLayer(function(layer) {
                if (layer instanceof L.Marker) {
                    testMap.removeLayer(layer);
                }
            });
            
            const group = new L.featureGroup();
            let validMarkers = 0;
            
            sampleEvents.forEach(event => {
                console.log('Processing event:', event.title, 'at', event.lat, event.lon);
                
                if (event.lat && event.lon && event.lat !== 0 && event.lon !== 0) {
                    const marker = L.marker([event.lat, event.lon])
                        .bindPopup(`
                            <div class="p-2">
                                <h4 class="font-semibold">${event.title}</h4>
                                <p class="text-sm text-gray-600">${event.city}</p>
                                <p class="text-xs text-gray-500">Rating: ${event.rating} ⭐</p>
                            </div>
                        `);
                    
                    group.addLayer(marker);
                    validMarkers++;
                    console.log('Added marker for:', event.title);
                } else {
                    console.error('Invalid coordinates for event:', event.title);
                }
            });
            
            console.log('Valid markers created:', validMarkers);
            
            if (validMarkers > 0) {
                // Add markers to map
                group.eachLayer(marker => marker.addTo(testMap));
                
                // Fit map to show all markers
                testMap.fitBounds(group.getBounds().pad(0.1));
                
                console.log('Map updated with event markers');
                console.log('Map bounds:', group.getBounds());
            } else {
                console.error('No valid markers to display');
            }
        }
        
        // Test if page refreshes
        window.addEventListener('beforeunload', function(e) {
            console.log('Page is about to refresh/reload!');
            addToConsole('WARNING: Page refresh detected!', 'error');
        });
    </script>
</body>
</html>
